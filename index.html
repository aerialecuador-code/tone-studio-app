function calcExpiry(planId) {
  const p = PLANS.find(x => x.id === planId);
  const d = new Date();
  d.setMonth(d.getMonth() + p.months);
  return d.toISOString();
}


// ── MAT MAP ──────────────────────────────────────────────────────────────────
const MATS_BACK  = Array.from({length:9}, (_,i) => ({ id:i+1,  col:i }));
const MATS_FRONT = Array.from({length:8}, (_,i) => ({ id:i+10, col:i }));
const TONE_GREEN = "#4a7a5a";

function StudioMap({ takenMats, selectedMat, onSelect }) {
  const W=560, H=420;
  const leftWall=44, rightWall=W-44, topWall=30, botWall=H-30;
  const floorW=rightWall-leftWall, floorH=botWall-topWall;
  const matW=54, matH=92, gapX=9, rowGap=16;
  const backTotalW=9*matW+8*gapX, frontTotalW=8*matW+7*gapX;
  const backStartX=leftWall+(floorW-backTotalW)/2;
  const frontStartX=leftWall+(floorW-frontTotalW)/2;
  const totalH=2*matH+rowGap;
  const backRowY=topWall+(floorH-totalH)/2;
  const frontRowY=backRowY+matH+rowGap;

  const renderMat=(mat,x,y)=>{
    const isTaken=takenMats.includes(mat.id);
    const isSelected=selectedMat===mat.id;
    return (
      <g key={mat.id} style={{cursor:isTaken?"not-allowed":"pointer"}} onClick={()=>!isTaken&&onSelect(mat.id)}>
        <rect x={x+2} y={y+3} width={matW} height={matH} rx={matW/2} fill="#00000018"/>
        <rect x={x} y={y} width={matW} height={matH} rx={matW/2}
          fill={isSelected?"#fff":isTaken?"#2a1218":BRAND}
          stroke={isSelected?BRAND:"transparent"} strokeWidth={isSelected?2:0}
          opacity={isTaken?0.4:1}/>
        <text x={x+matW/2} y={y+matH/2+5} textAnchor="middle" fontSize={15} fontWeight="700"
          fill={isSelected?BRAND:isTaken?BRAND+"60":"#eedde2"} fontFamily="DM Sans,sans-serif">
          {isTaken?"✕":mat.id}
        </text>
      </g>
    );
  };

  return (
    <svg viewBox={`0 0 ${W} ${H}`} width="100%" style={{display:"block"}}>
      {/* Floor */}
      <rect x={leftWall} y={topWall} width={floorW} height={floorH} fill="#f8f8f8"/>
      {Array.from({length:18}).map((_,i)=>(
        <rect key={i} x={leftWall} y={topWall+i*(floorH/18)} width={floorW} height={floorH/18-0.5}
          fill={i%2===0?"#f0f0f0":"#ebebeb"} opacity={0.5}/>
      ))}
      {/* Left wall */}
      <rect x={0} y={0} width={leftWall} height={H} fill="#f0eeea"/>
      <line x1={leftWall} y1={0} x2={leftWall} y2={H} stroke="#b0a898" strokeWidth={2}/>
      {/* Right wall */}
      <rect x={rightWall} y={0} width={W-rightWall} height={H} fill="#f0eeea"/>
      <line x1={rightWall} y1={0} x2={rightWall} y2={H} stroke="#b0a898" strokeWidth={2}/>
      {/* Top wall - coach */}
      <rect x={leftWall} y={0} width={floorW} height={topWall} fill="#f0eeea"/>
      <ellipse cx={leftWall+floorW/2} cy={topWall/2+2} rx={36} ry={11} fill={BRAND} opacity={0.1}/>
      <text x={leftWall+floorW/2} y={topWall/2+6} textAnchor="middle" fontSize={8}
        fill={BRAND} fontFamily="DM Sans,sans-serif" fontWeight="700" letterSpacing={1.5}>COACH ★</text>
      {/* Bottom wall - golf */}
      <rect x={leftWall} y={botWall} width={floorW} height={H-botWall} fill={TONE_GREEN}/>
      {Array.from({length:8}).map((_,i)=>(
        <rect key={i} x={leftWall+i*(floorW/8)} y={botWall} width={floorW/8-1} height={H-botWall}
          fill={i%2===0?TONE_GREEN:"#5a8a6a"} opacity={0.8}/>
      ))}
      <line x1={leftWall} y1={botWall} x2={rightWall} y2={botWall} stroke="#3a6a4a" strokeWidth={1.5}/>
      <text x={leftWall+floorW/2} y={botWall+(H-botWall)/2+4} textAnchor="middle" fontSize={7}
        fill="rgba(255,255,255,0.6)" fontFamily="DM Sans,sans-serif" letterSpacing={2}>CANCHA DE GOLF</text>
      {/* Row labels */}
      <text x={backStartX-6} y={backRowY+matH/2+4} textAnchor="end" fontSize={7} fill="#9a8f85" fontFamily="DM Sans,sans-serif">B</text>
      <text x={frontStartX-6} y={frontRowY+matH/2+4} textAnchor="end" fontSize={7} fill="#9a8f85" fontFamily="DM Sans,sans-serif">A</text>
      {/* Mats */}
      {MATS_BACK.map(m=>renderMat(m, backStartX+m.col*(matW+gapX), backRowY))}
      {MATS_FRONT.map(m=>renderMat(m, frontStartX+m.col*(matW+gapX), frontRowY))}
      {/* Legend */}
      {[{x:leftWall+20,label:"Disponible",fill:BRAND,op:1},{x:leftWall+110,label:"Ocupado",fill:"#2a1218",op:0.4},{x:leftWall+190,label:"Tu mat",fill:"#fff",stroke:BRAND}].map(l=>(
        <g key={l.label}>
          <rect x={l.x} y={botWall-18} width={10} height={10} rx={5} fill={l.fill} opacity={l.op||1} stroke={l.stroke||"none"} strokeWidth={l.stroke?1.5:0}/>
          <text x={l.x+14} y={botWall-9} fontSize={7} fill="#888" fontFamily="DM Sans,sans-serif">{l.label}</text>
        </g>
      ))}
    </svg>
  );
}

function App() {

  const [regForm,  setRegForm]  = useState({ name:"", phone:"", email:"", planId:"basic" });
  const [regErrors,setRegErrors]= useState({});

  // Auth session listener - sync myId with auth user
  useEffect(() => {
    db.auth.getSession().then(({ data: { session } }) => {
      const user = session?.user || null;
      setAuthUser(user);
      if (user) {
        setMyId(user.id);
        localStorage.setItem("ts_myid", user.id);
      } else {
        setMyId(null);
        localStorage.removeItem("ts_myid");
      }
    });
    const { data: { subscription } } = db.auth.onAuthStateChange((_event, session) => {
      const user = session?.user || null;
      setAuthUser(user);
      if (user) {
        setMyId(user.id);
        localStorage.setItem("ts_myid", user.id);
      } else {
        setMyId(null);
        localStorage.removeItem("ts_myid");
      }
    });
    return () => subscription.unsubscribe();
  }, []);

  // Auth functions
  const signUp = async () => {
    if (!authForm.name.trim()) { setAuthError("Ingresa tu nombre"); return; }
    if (!authForm.phone.trim()) { setAuthError("Ingresa tu teléfono"); return; }
    if (!authForm.email.trim() || !authForm.email.includes("@")) { setAuthError("Email inválido"); return; }
    if (authForm.password.length < 6) { setAuthError("La contraseña debe tener al menos 6 caracteres"); return; }
    if (authForm.password !== authForm.confirmPassword) { setAuthError("Las contraseñas no coinciden"); return; }
    setAuthLoading(true); setAuthError("");
    const { data, error } = await db.auth.signUp({ email: authForm.email, password: authForm.password });
    if (error) { setAuthError(error.message); setAuthLoading(false); return; }
    // Create member record linked to auth user
    const uid = data.user.id;
    const member = { id: uid, name: authForm.name.trim(), phone: authForm.phone.trim(),
      email: authForm.email.trim(), planId: "basic", classesLeft: 0,
      active: false, pendingPayment: true };
    await db.from("members").upsert({
      id: uid, name: member.name, phone: member.phone, email: member.email,
      plan_id: member.planId, classes_left: 0, active: false, pending_payment: true,
      registered_at: new Date().toISOString()
    });

    setMyId(uid);
    setAuthLoading(false);
    setPlanSelect(true); // show plan selection
  };

  const signIn = async () => {
    if (!authForm.email.trim() || !authForm.password.trim()) { setAuthError("Ingresa tu email y contraseña"); return; }
    setAuthLoading(true); setAuthError("");
    const { data, error } = await db.auth.signInWithPassword({ email: authForm.email, password: authForm.password });
    if (error) { setAuthError("Email o contraseña incorrectos"); setAuthLoading(false); return; }
    localStorage.setItem("ts_myid", data.user.id);
    setMyId(data.user.id);
    setAuthLoading(false);
    showToast("Bienvenida! 🎉", "#4a7a5a");
  };

  const signOut = async () => {
    await db.auth.signOut();
    localStorage.removeItem("ts_myid");
    setMyId(null);
    setAuthUser(null);
    setTab("schedule");
    showToast("Sesión cerrada", "#1a1a1a");
  };

  // Load all data from Supabase on mount
  useEffect(() => {
    async function fetchData() {
      setLoading(true);
      const [{ data: mems }, { data: ress }] = await Promise.all([
        db.from("members").select("*"),
        db.from("reservations").select("*"),
      ]);
      // Build members map
      const memMap = {};
      (mems||[]).forEach(m => {
        memMap[m.id] = { id:m.id, name:m.name, phone:m.phone, email:m.email,
          planId:m.plan_id, classesLeft:m.classes_left, expiresAt:m.expires_at,
          active:m.active, pendingPayment:m.pending_payment };
      });
      setMembers(memMap);
      // Build reservations map
      const resMap = {};
      (ress||[]).forEach(r => {
        if (!resMap[r.slot_key]) resMap[r.slot_key] = [];
        resMap[r.slot_key].push({ memberId:r.member_id, name:r.name, bookedAt:r.booked_at, mat:r.mat });
      });
      setReservations(resMap);
      setLoading(false);
    }
    fetchData();

    // Realtime subscription
    const channel = db.channel('tone-realtime')
      .on('postgres_changes', { event:'*', schema:'public', table:'reservations' }, () => {
        fetchData();
      })
      .on('postgres_changes', { event:'*', schema:'public', table:'members' }, () => {
        fetchData();
      })
      .subscribe((status) => {
        // Fallback: poll every 5 seconds if realtime not connected
        if (status !== 'SUBSCRIBED') {
          const poll = setInterval(fetchData, 30000);
          return () => clearInterval(poll);
        }
      });

    // Poll every 30 seconds as safety net (less intrusive)
    const safePoll = setInterval(fetchData, 30000);

    return () => { db.removeChannel(channel); clearInterval(safePoll); };
  }, []);

  const persistMem = async (id, data) => {
    await db.from("members").upsert({
      id, name:data.name, phone:data.phone, email:data.email,
      plan_id:data.planId, classes_left:data.classesLeft,
      expires_at:data.expiresAt, active:data.active, pending_payment:data.pendingPayment
    });
    setMembers(prev => ({ ...prev, [id]: data }));
  };

  const addReservation = async (key, entry) => {
    await db.from("reservations").insert({ slot_key:key, member_id:entry.memberId, name:entry.name, mat:entry.mat||null });
    setReservations(prev => ({ ...prev, [key]: [...(prev[key]||[]), entry] }));
  };

  const removeReservation = async (key, memberId) => {
    await db.from("reservations").delete().eq("slot_key", key).eq("member_id", memberId);
    setReservations(prev => ({ ...prev, [key]: (prev[key]||[]).filter(r => r.memberId !== memberId) }));

  const myReservations = Object.entries(reservations).flatMap(([key, list]) =>

    const dayOrder = ["Lun","Mar","Mié","Jue","Vie","Sáb"];
    const [da, ia] = a.key.split("-"); const [db, ib] = b.key.split("-");
    const dayDiff = dayOrder.indexOf(da) - dayOrder.indexOf(db);
    if (dayDiff !== 0) return dayDiff;
    return parseInt(ia) - parseInt(ib);

    // Open admin's WhatsApp with client number pre-filled - admin just taps send

                Banco del Pichincha · Cta. Ahorros<br/>
                Nro: <b>2211888337</b><br/>
                Ma. Mercedes Hernández · CI: 0915614051<br/>
                aerialecuador@gmail.com
              </div>
            </div>

            <button className="tap" onClick={()=>{
              if(!me) return;
              const msg = encodeURIComponent("Hola! Soy " + me.name + " y acabo de realizar el pago para renovar mi plan.\nTelefono: " + me.phone + "\nPor favor confirmar mi reactivacion.");
              window.open("https://wa.me/" + ADMIN_WA + "?text=" + msg, "_blank");
              setRenewModal(false);
              showToast("WhatsApp enviado al admin 📲","#4a7a5a");
            }} style={{
              width:"100%",padding:"14px",background:BRAND,color:"#fff",
              border:"none",borderRadius:14,fontFamily:"'DM Sans',sans-serif",fontSize:14,fontWeight:700
            }}>Ya pagué — Notificar al admin 📲</button>
          </div>
        </div>
      )}

      {/* BANK MODAL */}
      {bankModal && (
        <div style={{ position:"fixed", inset:0, background:"#00000055", display:"flex", alignItems:"flex-end", zIndex:100 }} onClick={()=>setBankModal(false)}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:BG, borderRadius:"24px 24px 0 0", padding:"24px 24px 44px",
            width:"100%", maxWidth:420, margin:"0 auto", boxShadow:"0 -8px 40px #00000020"
          }}>
            <div style={{ width:36, height:4, background:"#ddd", borderRadius:4, margin:"0 auto 20px" }}/>
            <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:26, color:BRAND, letterSpacing:2, marginBottom:16 }}>💳 DATOS DE PAGO</div>
            <div style={{ background:"#fff", borderRadius:16, padding:"18px", border:`1px solid ${BRAND}20` }}>
              <div style={{ fontSize:13, color:"#555", lineHeight:2.2 }}>
                <b>Banco del Pichincha</b><br/>
                Cuenta de Ahorros<br/>
                Nro: <b>2211888337</b><br/>
                Ma. Mercedes Hernández<br/>
                CI: 0915614051<br/>
                aerialecuador@gmail.com
              </div>
            </div>
            <div style={{ fontSize:11, color:"#aaa", textAlign:"center", marginTop:12 }}>
              ⚠️ Cancelaciones con menos de {CANCEL_HOURS}h de anticipación descuentan la clase
            </div>
            <button className="tap" onClick={()=>setBankModal(false)} style={{
              width:"100%", padding:"13px", marginTop:16, background:BRAND, color:"#fff",
              border:"none", borderRadius:14, fontSize:14, fontWeight:700
            }}>Cerrar</button>
          </div>
        </div>
      )}

      {/* BOOK MODAL */}
      {bookModal && (
        <div style={{ position:"fixed", inset:0, background:"#00000055", display:"flex", alignItems:"flex-end", zIndex:100 }} onClick={()=>setBookModal(null)}>
          <div onClick={e=>e.stopPropagation()} style={{
            background:BG, borderRadius:"24px 24px 0 0", padding:"24px 24px 44px",
            width:"100%", maxWidth:420, margin:"0 auto", boxShadow:"0 -8px 40px #00000020"
          }}>
            <div style={{ width:36, height:4, background:"#ddd", borderRadius:4, margin:"0 auto 20px" }}/>
            <div style={{ fontFamily:"'Bebas Neue',sans-serif", fontSize:26, color:BRAND, letterSpacing:2, lineHeight:1, marginBottom:4 }}>CONFIRMAR RESERVA</div>
            <div style={{ fontSize:14, color:"#555", fontWeight:600, marginBottom:4 }}>⏰ {bookModal.day} · {SCHEDULE[bookModal.day].times[bookModal.idx]}</div>
            <div style={{ fontSize:12, color:"#888", marginBottom:4 }}>{SCHEDULE[bookModal.day].label}</div>
            <div style={{ fontSize:11, color:"#aaa", marginBottom:16 }}>
              {spotsLeft(bookModal.day,bookModal.idx)} cupos disponibles
              {plan && !plan.unlimited && <span> · Te quedarán <b>{me.classesLeft-1}</b> clases</span>}
            </div>
            <div style={{ background:"#fff3cd", borderRadius:10, padding:"8px 12px", marginBottom:16, fontSize:11, color:"#856404" }}>
              ⚠️ Cancelaciones con menos de {CANCEL_HOURS}h de anticipación descuentan la clase
            </div>
            <button className="tap" onClick={confirmBook} style={{
              width:"100%", padding:"14px", background:BRAND, color:"#fff",
              border:"none", borderRadius:14, fontSize:15, fontWeight:700
            }}>Confirmar ✓</button>
          </div>
        </div>
      )}


      {/* MAT MODAL */}
      {matModal && (() => {
        const takenMats = (reservations[matModal.key]||[]).map(r=>r.mat).filter(m=>m!=null);
        return (
          <div style={{position:"fixed",inset:0,background:"#00000055",display:"flex",alignItems:"flex-end",zIndex:100}}
            onClick={()=>setMatModal(null)}>
            <div onClick={e=>e.stopPropagation()} style={{
              background:BG, borderRadius:"24px 24px 0 0", padding:"20px 16px 44px",
              width:"100%", maxWidth:420, margin:"0 auto", boxShadow:"0 -8px 40px #00000020"
            }}>
              <div style={{width:36,height:4,background:"#ddd",borderRadius:4,margin:"0 auto 16px"}}/>
              <div style={{fontFamily:"'Bebas Neue',sans-serif",fontSize:22,color:BRAND,letterSpacing:2,marginBottom:2}}>
                ESCOGE TU MAT
              </div>
              <div style={{fontSize:11,color:"#aaa",marginBottom:12}}>
                {matModal.day} · {SCHEDULE[matModal.day].times[matModal.idx]}
              </div>
              <div style={{background:"#fff",borderRadius:16,padding:"10px 6px",marginBottom:12,overflow:"hidden"}}>
                <StudioMap
                  takenMats={takenMats}
                  selectedMat={pickedMat}
                  onSelect={setPickedMat}
                />
              </div>
              {pickedMat && (
                <div style={{background:"#eedde2",borderRadius:12,padding:"10px 14px",marginBottom:12,
                  display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div style={{fontSize:12,fontWeight:700,color:BRAND}}>Mat {pickedMat} seleccionado ✓</div>
                </div>
              )}
              <button className="tap" onClick={confirmMatAndBook} style={{
                width:"100%", padding:"14px",
                background: pickedMat ? BRAND : "#e0dbd0",
                color: pickedMat ? "#fff" : "#aaa",
                border:"none", borderRadius:14,
                fontFamily:"'DM Sans',sans-serif", fontSize:15, fontWeight:700,
              }}>
                {pickedMat ? `Confirmar Mat ${pickedMat} ✓` : "Selecciona un mat"}
              </button>
            </div>
          </div>
        );
      })()}

      {/* TOAST */}
      {toast && (
        <div style={{
          position:"fixed", bottom:28, left:"50%", transform:"translateX(-50%)",
          background:toast.color, color:"#fff", padding:"12px 24px", borderRadius:24,
          fontSize:13, fontWeight:700, boxShadow:"0 4px 20px #00000025",
          zIndex:200, whiteSpace:"nowrap", maxWidth:"90vw", textAlign:"center"
        }}>{toast.msg}</div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
